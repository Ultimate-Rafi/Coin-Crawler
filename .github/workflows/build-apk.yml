name: Mobile APK Compiler
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Game Into Pre-Built APK Template
        run: |
          # 1. Download the official, pre-compiled Android Base APK
          wget -q https://github.com
          
          # 2. Install zip tool to modify the APK archive directly
          sudo apt-get update && sudo apt-get install -y zip
          
          # 3. Create the exact folder layout inside the APK structure
          mkdir -p assets
          cp game.love assets/game.love
          
          # 4. Inject your game directly into the APK file without compiling anything
          zip -g love-11.5-android.apk assets/game.love
          
          # 5. Rename it to your final output game
          mv love-11.5-android.apk my-alpha-game.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: game-alpha-build
          path: my-alpha-game.apk
