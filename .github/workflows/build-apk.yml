name: Mobile APK Compiler
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download LÖVE Android Source
        run: |
          wget https://github.com
          unzip -q love-11.5-android-embed.zip -d build-dir
          rm love-11.5-android-embed.zip

      - name: Inject Game File
        run: |
          # Create the specific folder for the Embed flavor
          mkdir -p build-dir/love-android-embed/app/src/embed/assets
          cp game.love build-dir/love-android-embed/app/src/embed/assets/game.love

      - name: Build APK (Ultra-Low Memory)
        run: |
          cd build-dir/love-android-embed
          chmod +x gradlew
          # Force 1GB limit, no daemon, sequential execution, and specific EmbedNoRecord target
          ./gradlew assembleEmbedNoRecordDebug \
            --no-daemon \
            --no-parallel \
            --max-workers=1 \
            -Dorg.gradle.jvmargs="-Xmx1024m -XX:MaxMetaspaceSize=256m"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: game-alpha-build
          # Note the path change to match the specific build target
          path: build-dir/love-android-embed/app/build/outputs/apk/embedNoRecord/debug/*.apk