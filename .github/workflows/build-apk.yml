name: Mobile APK Compiler
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fetch Light Project Template
        run: |
          wget https://github.com
          unzip -q love-11.5-android-embed.zip -d build-dir

      - name: Clean Junk Files (Save Space)
        run: |
          rm love-11.5-android-embed.zip
          rm -rf build-dir/love-android-embed/gradle/wrapper/gradle-*.zip

      - name: Inject Your Game
        run: |
          mkdir -p build-dir/love-android-embed/app/src/main/assets
          cp game.love build-dir/love-android-embed/app/src/main/assets/game.love

      - name: Build APK (Low Memory Mode)
        run: |
          cd build-dir/love-android-embed
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers=1 -Dorg.gradle.jvmargs=-Xmx2048m

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: game-alpha-build
          path: build-dir/love-android-embed/app/build/outputs/apk/debug/*.apk
