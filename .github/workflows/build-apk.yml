name: Mobile APK Compiler
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android APK
        uses: love-actions/love-actions-android@v2
        with:
          love-version: '11.5'
          game-path: '.' # Looks for game.love in your root directory

      - name: Upload Final APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-alpha-build
          path: artifacts/*.apk
